<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    h3 { margin: 0 0 10px; color: #333; }
    button { width: 100%; padding: 10px; background: #333; color: white; border: none; cursor: pointer; margin-top: 10px; border-radius: 4px; }
    button:hover { background: #555; }
    button:disabled { background: #999; cursor: not-allowed; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .status { margin-top: 10px; font-size: 12px; color: #666; }
    .status.error { color: #c00; }
    .status.success { color: #060; }
    .section { margin-bottom: 15px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .profile-section { display: none; }
    .profile-section.visible { display: block; }
    hr { border: none; border-top: 1px solid #eee; margin: 15px 0; }
  </style>
</head>
<body>
  <h3>SudoFillr</h3>
  
  <div class="section">
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://your-repl.replit.app" />
    <button id="saveBtn">Save URL</button>
  </div>
  
  <hr />
  
  <div class="section profile-section" id="profileSection">
    <label>Select Resume Profile</label>
    <select id="profileSelect">
      <option value="">Loading profiles...</option>
    </select>
  </div>
  
  <button id="fillBtn">Autofill Job Application</button>
  
  <div class="status" id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
